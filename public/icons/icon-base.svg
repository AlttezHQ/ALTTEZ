<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Background -->
  <rect width="512" height="512" rx="80" fill="#0d0d1a"/>

  <!-- Outer glow ring -->
  <circle cx="256" cy="256" r="200" fill="none" stroke="#7c3aed" stroke-width="3" opacity="0.4"/>

  <!-- Shield body -->
  <path d="M256 96 L380 148 L380 288 Q380 380 256 432 Q132 380 132 288 L132 148 Z"
        fill="url(#shieldGrad)"
        stroke="#7c3aed"
        stroke-width="2"/>

  <!-- Shield inner highlight -->
  <path d="M256 116 L364 162 L364 284 Q364 366 256 412 Q148 366 148 284 L148 162 Z"
        fill="url(#innerGrad)"
        opacity="0.6"/>

  <!-- Lightning bolt / Elevate mark -->
  <path d="M284 168 L228 268 L262 268 L232 352 L304 236 L268 236 Z"
        fill="#7c3aed"/>
  <path d="M284 168 L228 268 L262 268 L232 352 L304 236 L268 236 Z"
        fill="url(#boltGrad)"
        opacity="0.9"/>

  <!-- Top accent line -->
  <line x1="200" y1="148" x2="312" y2="148" stroke="#a78bfa" stroke-width="2" opacity="0.5"/>

  <defs>
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e1040;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#0d0d1a;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="innerGrad" x1="0%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" style="stop-color:#7c3aed;stop-opacity:0.2"/>
      <stop offset="100%" style="stop-color:#7c3aed;stop-opacity:0"/>
    </linearGradient>
    <linearGradient id="boltGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#c4b5fd;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#7c3aed;stop-opacity:1"/>
    </linearGradient>
  </defs>
</svg>
